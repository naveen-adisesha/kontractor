apiVersion: v1
kind: Service
metadata:
  name: {{ include "echo-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "echo-server.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "echo-server.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.echo.port }}
      targetPort: http
      protocol: TCP
