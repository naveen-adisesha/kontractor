{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "echo-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "echo-server.labels" . | nindent 4 }}
  annotations:
    kontractor.io/managed: "true"
    kontractor.io/source: "contract:echo-server:rbac.rules"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "echo-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "echo-server.labels" . | nindent 4 }}
  annotations:
    kontractor.io/managed: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "echo-server.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "echo-server.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
